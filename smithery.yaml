# Smithery configuration: https://smithery.ai/docs/build/session-config

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      lang:
        type: string
        title: Response Language
        description: "Language for threat descriptions and recommendations in scan results. Defaults to English."
        enum:
          - en
          - zh
          - ja
        default: en
        x-from:
          query: lang
    required: []
  exampleConfig:
    lang: en
