# Smithery configuration: https://smithery.ai/docs/build/session-config
# URL-published HTTP server — all config fields are optional with defaults

configSchema:
  type: object
  properties:
    lang:
      type: string
      title: Response Language
      description: "Language for threat descriptions and recommendations (en = English, zh = Chinese, ja = Japanese). Defaults to English."
      enum:
        - en
        - zh
        - ja
      default: en
      x-from:
        query: lang

exampleConfig:
  lang: en
